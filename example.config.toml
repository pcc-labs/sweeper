# .sweeper/config.toml — sweeper project configuration
# Copy to .sweeper/config.toml or ~/.sweeper/config.toml
#
# Precedence (highest to lowest):
#   1. CLI flags (--concurrency, --provider, etc.)
#   2. SWEEPER_* environment variables
#   3. .sweeper/config.toml (project)
#   4. ~/.sweeper/config.toml (user)
#   5. Built-in defaults

version = 1

[run]
concurrency = 2
rate_limit = "2s"
max_rounds = 1
stale_threshold = 2
# dry_run = false

[provider]
name = "claude"
# model = ""
# api_base = ""
# allowed_tools = ["Read", "Write", "Edit", "Glob", "Grep"]
# When the paper CLI is installed, sweeper launches claude sub-agents via
# `paper start claude` so paper's gateway manages auth and captures the session
# (no ANTHROPIC_API_KEY is used). No configuration is needed.

# [worker]
# Alias for [provider] — the fix-executing role. Non-empty worker fields win
# over [provider], which remains supported for back-compat.
# name = "ollama"
# model = "qwen2.5-coder:7b"
# api_base = "http://localhost:11434"

# [worker.escalation]
# Model escalation ladder: rungs above the base worker, climbed one step per
# stagnation (stale_threshold non-improving rounds), keeping the exploration
# prompt. Entries are "model" (runs on the worker's provider) or
# "provider/model". A file is only given up on after exploring at the top rung.
# A rung on a different provider than the worker uses that provider's default
# endpoint; api_base above only applies to the worker's own provider.
# ladder = ["claude/claude-haiku-4-5", "claude/claude-sonnet-5"]

# [advisor]
# Optional sweep-planning phase: a frontier model plans each round (task
# ordering, difficulty, strategy hints) before cheap workers execute fixes.
# The advisor sees lint output and history only — never file contents.
# Requires a CLI provider (claude, codex). Unset = disabled (mechanical plan).
# name = "claude"
# model = "claude-opus-4-8"

[telemetry]
# backend: "jsonl" (default, always active) or "confluent" (adds Kafka fan-out)
backend = "jsonl"
dir = ".sweeper/telemetry"

# [telemetry.confluent]
# brokers = ["pkc-xxxxx.us-west-2.aws.confluent.cloud:9092"]
# topic = "sweeper.telemetry"
# client_id = "sweeper"
# api_key_env = "CONFLUENT_API_KEY"
# api_secret_env = "CONFLUENT_API_SECRET"
# publish_timeout = "5s"

